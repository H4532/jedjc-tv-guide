name: Deploy TV Guide to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore Option 3 brand asset
        run: cat assets/logo-option3.part* | base64 --decode > assets/holiday-inn-corniche-lockup.webp

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bilingual PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core libraqm0
          python -m pip install --disable-pip-version-check "PyMuPDF==1.26.3" "qrcode[pil]==8.2"
          python -c "from PIL import features; assert features.check('raqm'), 'Arabic text shaping support is unavailable'"

      - name: Build validated branded bilingual PDF
        run: python tools/build_pdf.py

      - name: Remove deployment source files
        run: |
          rm -f TV_Channel_Guide.pdf.b64
          rm -f assets/logo-option3.part*
          rm -rf tools

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
